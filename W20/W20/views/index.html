<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Form Styles */
        .form-section {
            background: #16213e;
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1px solid #0f3460;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-section h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 6px;
            color: #a0b4d0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            padding: 10px 14px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: #fff;
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #0096c7, #005f8a);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
        }

        .btn-update {
            background: linear-gradient(135deg, #f4a261, #e76f51);
            color: #fff;
        }

        .btn-update:hover {
            background: linear-gradient(135deg, #e09550, #d45a3a);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(244, 162, 97, 0.4);
        }

        .btn-clear {
            background: #2a2a4a;
            color: #a0b4d0;
            border: 1px solid #0f3460;
        }

        .btn-clear:hover {
            background: #333366;
            transform: translateY(-2px);
        }

        /* Table Styles */
        .table-section {
            background: #16213e;
            border-radius: 12px;
            padding: 25px 30px;
            border: 1px solid #0f3460;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .table-section h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #0f3460;
            color: #00d4ff;
            padding: 12px 10px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        thead th:first-child {
            border-radius: 8px 0 0 0;
        }

        thead th:last-child {
            border-radius: 0 8px 0 0;
        }

        tbody tr {
            border-bottom: 1px solid #0f3460;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        tbody td {
            padding: 12px 10px;
            font-size: 0.92rem;
            color: #c0d0e0;
        }

        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            margin-right: 6px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #f4a261;
            color: #1a1a2e;
        }

        .edit-btn:hover {
            background: #e09550;
            transform: translateY(-1px);
        }

        .delete-btn {
            background: #e63946;
            color: #fff;
        }

        .delete-btn:hover {
            background: #c5303c;
            transform: translateY(-1px);
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #6080a0;
            font-size: 1rem;
        }

        /* Message */
        .message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
            text-align: center;
        }

        .message.success {
            background: rgba(0, 200, 150, 0.15);
            color: #00c896;
            border: 1px solid rgba(0, 200, 150, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(230, 57, 70, 0.15);
            color: #e63946;
            border: 1px solid rgba(230, 57, 70, 0.3);
            display: block;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Management System</h1>

        <div id="message" class="message"></div>

        <!-- Add / Update Employee Form -->
        <div class="form-section">
            <h2 id="formTitle">Add New Employee</h2>
            <input type="hidden" id="employeeId">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter employee name">
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" placeholder="Enter department">
                </div>
                <div class="form-group">
                    <label for="designation">Designation</label>
                    <input type="text" id="designation" placeholder="Enter designation">
                </div>
                <div class="form-group">
                    <label for="salary">Salary</label>
                    <input type="number" id="salary" placeholder="Enter salary">
                </div>
                <div class="form-group">
                    <label for="joiningDate">Joining Date</label>
                    <input type="date" id="joiningDate">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-add" id="addBtn" onclick="addEmployee()">Add Employee</button>
                <button class="btn btn-update" id="updateBtn" onclick="updateEmployee()" style="display:none;">Update Employee</button>
                <button class="btn btn-clear" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <!-- Employee Records Table -->
        <div class="table-section">
            <h2>Employee Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Salary</th>
                        <th>Joining Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    <tr><td colspan="6" class="no-data">No employees found. Add one above!</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = '/api/employees';

        // Show message
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => { msg.className = 'message'; }, 3000);
        }

        // Fetch and display all employees
        async function fetchEmployees() {
            try {
                const res = await fetch(API_URL);
                const employees = await res.json();
                const tbody = document.getElementById('employeeTableBody');

                if (employees.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="no-data">No employees found. Add one above!</td></tr>';
                    return;
                }

                tbody.innerHTML = employees.map(emp => {
                    const date = new Date(emp.joiningDate).toLocaleDateString('en-IN');
                    return `<tr>
                        <td>${emp.name}</td>
                        <td>${emp.department}</td>
                        <td>${emp.designation}</td>
                        <td>${emp.salary.toLocaleString('en-IN')}</td>
                        <td>${date}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="editEmployee('${emp._id}')">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteEmployee('${emp._id}')">Delete</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (err) {
                showMessage('Error fetching employees', 'error');
            }
        }

        // Add new employee
        async function addEmployee() {
            const data = getFormData();
            if (!data) return;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showMessage('Employee added successfully!', 'success');
                    clearForm();
                    fetchEmployees();
                } else {
                    const err = await res.json();
                    showMessage(err.message || 'Error adding employee', 'error');
                }
            } catch (err) {
                showMessage('Error adding employee', 'error');
            }
        }

        // Edit - populate form with employee data
        async function editEmployee(id) {
            try {
                const res = await fetch(API_URL + '/' + id);
                const emp = await res.json();

                document.getElementById('employeeId').value = emp._id;
                document.getElementById('name').value = emp.name;
                document.getElementById('department').value = emp.department;
                document.getElementById('designation').value = emp.designation;
                document.getElementById('salary').value = emp.salary;
                document.getElementById('joiningDate').value = emp.joiningDate.split('T')[0];

                document.getElementById('formTitle').textContent = 'Update Employee';
                document.getElementById('addBtn').style.display = 'none';
                document.getElementById('updateBtn').style.display = 'inline-block';

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                showMessage('Error loading employee data', 'error');
            }
        }

        // Update employee
        async function updateEmployee() {
            const id = document.getElementById('employeeId').value;
            const data = getFormData();
            if (!data) return;

            try {
                const res = await fetch(API_URL + '/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showMessage('Employee updated successfully!', 'success');
                    clearForm();
                    fetchEmployees();
                } else {
                    const err = await res.json();
                    showMessage(err.message || 'Error updating employee', 'error');
                }
            } catch (err) {
                showMessage('Error updating employee', 'error');
            }
        }

        // Delete employee
        async function deleteEmployee(id) {
            if (!confirm('Are you sure you want to delete this employee?')) return;

            try {
                const res = await fetch(API_URL + '/' + id, { method: 'DELETE' });

                if (res.ok) {
                    showMessage('Employee deleted successfully!', 'success');
                    fetchEmployees();
                } else {
                    showMessage('Error deleting employee', 'error');
                }
            } catch (err) {
                showMessage('Error deleting employee', 'error');
            }
        }

        // Get form data
        function getFormData() {
            const name = document.getElementById('name').value.trim();
            const department = document.getElementById('department').value.trim();
            const designation = document.getElementById('designation').value.trim();
            const salary = document.getElementById('salary').value;
            const joiningDate = document.getElementById('joiningDate').value;

            if (!name || !department || !designation || !salary || !joiningDate) {
                showMessage('Please fill in all fields', 'error');
                return null;
            }

            return { name, department, designation, salary: Number(salary), joiningDate };
        }

        // Clear form
        function clearForm() {
            document.getElementById('employeeId').value = '';
            document.getElementById('name').value = '';
            document.getElementById('department').value = '';
            document.getElementById('designation').value = '';
            document.getElementById('salary').value = '';
            document.getElementById('joiningDate').value = '';

            document.getElementById('formTitle').textContent = 'Add New Employee';
            document.getElementById('addBtn').style.display = 'inline-block';
            document.getElementById('updateBtn').style.display = 'none';
        }

        // Load employees on page load
        fetchEmployees();
    </script>
</body>
</html>
